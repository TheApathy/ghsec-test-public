name: pages-recon
on:
  push:
    branches: [gh-pages-recon]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5
      - name: Build env recon (BUILD job)
        run: |
          set +e
          mkdir -p ./_site
          OUT=./_site/recon-build.txt
          {
            echo "=== BUILD JOB RECON ==="
            echo "DATE: $(date -u +%FT%TZ)"
            echo "RUNNER_NAME: ${RUNNER_NAME:-?}"
            echo "RUNNER_OS: ${RUNNER_OS:-?}"
            echo "ImageOS: ${ImageOS:-?}"
            echo "ImageVersion: ${ImageVersion:-?}"
            echo "HOSTNAME: $(hostname)"
            echo "FQDN: $(hostname -f 2>/dev/null)"
            echo "--- /etc/resolv.conf ---"
            cat /etc/resolv.conf 2>/dev/null
            echo "--- nameservers ---"
            grep ^nameserver /etc/resolv.conf 2>/dev/null
            echo "--- IPs ---"
            ip -o -4 addr show 2>/dev/null
            echo "--- routes ---"
            ip route 2>/dev/null
            echo "--- public egress ---"
            curl -sS --max-time 5 https://api.ipify.org || echo "ipify-fail"
            echo
            echo "--- Azure IMDS ---"
            curl -sS --max-time 3 -H 'Metadata: true' \
              'http://169.254.169.254/metadata/instance?api-version=2021-02-01' || echo "azure-imds-fail"
            echo
            echo "--- AWS IMDS v2 ---"
            T=$(curl -sS --max-time 3 -X PUT -H 'X-aws-ec2-metadata-token-ttl-seconds: 60' \
                 http://169.254.169.254/latest/api/token 2>/dev/null)
            if [ -n "$T" ]; then
              curl -sS --max-time 3 -H "X-aws-ec2-metadata-token: $T" \
                http://169.254.169.254/latest/dynamic/instance-identity/document
            else
              echo "aws-imds-fail"
            fi
            echo
            echo "--- GCP IMDS ---"
            curl -sS --max-time 3 -H 'Metadata-Flavor: Google' \
              http://metadata.google.internal/computeMetadata/v1/instance/?recursive=true || echo "gcp-imds-fail"
            echo
            echo "--- GitHub-internal DNS resolution attempts ---"
            for n in gitrpcd gitrpcd.service.consul spokesd spokesd.service.consul \
                     babeld babeld.service.consul hooks-server hooks.github.com \
                     pages-builder.service.consul pages.github.com \
                     github.githubapp.com lb-140-82-114-3-iad.github.com; do
              R=$(getent hosts "$n" 2>&1 | head -1)
              echo "  $n -> ${R:-NXDOMAIN}"
            done
            echo "--- reverse DNS of own egress IP ---"
            EIP=$(curl -sS --max-time 5 https://api.ipify.org 2>/dev/null)
            if [ -n "$EIP" ]; then
              dig +short -x "$EIP" @1.1.1.1 2>/dev/null || echo "ptr-fail"
            fi
            echo "--- HTTP probe gitrpcd-like targets (2s timeout) ---"
            for u in https://api.github.com/_status \
                     https://api.github.com/twirp/spokes-proto.hooks.v1.HooksAPI \
                     http://gitrpcd:8080 http://spokesd:8080 \
                     http://babeld:9000 http://hooks-server:80; do
              CODE=$(curl -sS -o /dev/null --max-time 2 -w '%{http_code}' "$u" 2>&1)
              echo "  $u -> ${CODE}"
            done
            echo "--- env (filtered) ---"
            env | grep -iE 'GITHUB|RUNNER|ACTIONS|PAGES|AZURE|AGENT' \
                | grep -viE 'TOKEN|SECRET|KEY|PASSWORD' \
                | sort
            echo "=== END BUILD RECON ==="
          } > "$OUT" 2>&1
          echo "Wrote $OUT ($(wc -c < $OUT) bytes)"
          # Mirror to job log so we can read it via gh run view
          echo "----- BEGIN RECON DUMP -----"
          cat "$OUT"
          echo "----- END RECON DUMP -----"
      - name: Materialize site
        run: |
          cp index.html ./_site/index.html
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy env recon (DEPLOY job)
        run: |
          set +e
          {
            echo "=== DEPLOY JOB RECON ==="
            echo "DATE: $(date -u +%FT%TZ)"
            echo "RUNNER_NAME: ${RUNNER_NAME:-?}"
            echo "HOSTNAME: $(hostname)"
            echo "FQDN: $(hostname -f 2>/dev/null)"
            ip -o -4 addr show 2>/dev/null
            curl -sS --max-time 5 https://api.ipify.org && echo
            curl -sS --max-time 3 -H 'Metadata: true' \
              'http://169.254.169.254/metadata/instance?api-version=2021-02-01' || echo "azure-imds-fail"
            echo
            echo "--- gh-internal DNS during deploy ---"
            for n in gitrpcd spokesd babeld hooks-server pages-builder pages.github.com; do
              R=$(getent hosts "$n" 2>&1 | head -1)
              echo "  $n -> ${R:-NXDOMAIN}"
            done
            echo "=== END DEPLOY RECON ==="
          } 2>&1
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
